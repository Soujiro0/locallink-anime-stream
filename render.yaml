services:
  - type: web
    name: anime-stream
    env: docker
    # Replace with the actual URL to your GitHub/GitLab repository
    repo: https://github.com/Soujiro0/locallink-anime-stream
    plan: free # A Free or Starter plan provides ~512MB of memory
    region: oregon

    # Matches your build context and Dockerfile path
    dockerContext: .
    dockerfilePath: ./docker/Dockerfile

    envVars:
      - key: NODE_ENV
        value: production
      - key: NO_PROMPT
        value: "true"
      - key: VITE_DEPLOY_ENV
        value: "CLOUD"

      # Note: Render automatically injects its own PORT environment variable
      # and routes traffic to it. You usually don't need to hardcode it,
      # but if your app strictly requires 3000, you can enforce it here.
      - key: PORT
        value: "3000"
