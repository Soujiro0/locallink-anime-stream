events { 
    worker_connections 1024; 
}

http {
    # Basic optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Include default MIME types (prevents CSS/JS loading issues)
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name locallink.test;

        # ==========================================
        # 1. Main Application Route
        # Handles React UI, standard API calls, and WebSockets
        # ==========================================
        location / {
            proxy_pass http://locallink:3000;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Enable WebSocket support (crucial for React/Node real-time features)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==========================================
        # 2. Video Streaming Proxy Route
        # Explicitly targets your /proxy endpoint to disable buffering
        # ==========================================
        location /proxy {
            # NO trailing slash! Passes the raw URI and query string exactly as-is
            proxy_pass http://locallink:3000;

            # Essential Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # VIDEO STREAMING FIXES: Disable all buffering and caching
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;

            # Prevent timeouts for large or slow video chunks
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}