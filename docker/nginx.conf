events { 
    worker_connections 1024; 
    multi_accept on;
}

http {
    # Performance & memory optimizations
    server_tokens off;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    client_max_body_size 10M;

    # Buffer tuning to prevent excessive memory allocations
    client_body_buffer_size 16k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    # Include default MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name locallink.test;

        # ==========================================
        # 1. Static Asset Caching
        # Offload static asset serving & browser cache rules
        # ==========================================
        location ~* \.(?:css|js|woff2?|svg|gif|png|jpg|jpeg|ico|map)$ {
            proxy_pass http://locallink:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            expires 1y;
            access_log off;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # ==========================================
        # 2. Main Application Route
        # Handles React UI, standard API calls, and WebSockets
        # ==========================================
        location / {
            proxy_pass http://locallink:3000;
            
            # Standard proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Enable WebSocket support & keepalive pooling
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ==========================================
        # 3. Video Streaming Proxy Route
        # Explicitly targets your /proxy endpoint to disable buffering
        # ==========================================
        location /proxy {
            proxy_pass http://locallink:3000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";

            # Essential Proxy Headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # VIDEO STREAMING FIXES: Disable all buffering and caching
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            gzip off;

            # Prevent timeouts for large or slow video chunks
            proxy_read_timeout 300s;
            proxy_connect_timeout 300s;
            proxy_send_timeout 300s;
        }
    }
}