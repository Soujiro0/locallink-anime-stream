services:
  locallink:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
    image: locallink-anime-stream-app:latest
    container_name: locallink-anime-stream
    # Expose tells Docker to open the port internally, but keeps it hidden from your host machine
    expose:
      - "${PORT:-3000}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NO_PROMPT=${NO_PROMPT:-true}
      - PORT=${PORT:-3000}
      - NODE_OPTIONS=--max-old-space-size=128
    command: node --optimize-for-size index.js
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations: # ponytail: min required resource reserves
          cpus: '0.05'
          memory: 64M

  # The new Reverse Proxy
  proxy:
    image: nginx:alpine
    container_name: locallink-proxy
    ports:
      - "${PROXY_PORT:-3010}:80" # Binds the proxy to your machine's default HTTP web port
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - locallink
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.02'
          memory: 16M
