services:
  locallink:
    build:
      context: .
      dockerfile: ./docker/Dockerfile
      args:
        - VITE_DEPLOY_ENV=${VITE_DEPLOY_ENV:-LOCAL}
    container_name: locallink-anime-stream
    # Expose tells Docker to open the port internally, but keeps it hidden from your host machine
    expose:
      - "${PORT:-3000}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - NO_PROMPT=${NO_PROMPT:-true}
      - PORT=${PORT:-3000}
      - VITE_DEPLOY_ENV=${VITE_DEPLOY_ENV:-LOCAL}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # The new Reverse Proxy
  proxy:
    image: nginx:alpine
    container_name: locallink-proxy
    ports:
      - "${PROXY_PORT:-3010}:80" # Binds the proxy to your machine's default HTTP web port
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - locallink
    restart: unless-stopped
